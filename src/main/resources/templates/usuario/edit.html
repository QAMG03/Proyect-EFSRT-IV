<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario</title>
    <link rel="stylesheet" th:href="@{/css/stylesCliente.css}">
</head>
<body>
<div class="container">
    <h1>✏️ Editar Usuario</h1>

    <form th:action="@{/admin/usuarios/guardar}" th:object="${usuario}" method="post" class="form-box">
        <input type="hidden" th:field="*{id}"/>

        <div class="form-group">
            <label>Nombre:</label>
            <input type="text" th:field="*{nombres}" required/>
        </div>

        <div class="form-group">
            <label>Apellido:</label>
            <input type="text" th:field="*{apellidos}" required/>
        </div>

        <div class="form-group">
            <label>Usuario:</label>
            <input type="text" th:field="*{username}" readonly/>
        </div>

        <div class="form-group">
            <label>Contraseña:</label>
            <input type="password" th:field="*{password}" placeholder="Mantener si no desea cambiar" required/>
        </div>

        <div class="form-group">
            <label>DNI:</label>
            <input type="text" th:field="*{dni}" required/>
        </div>

        <div class="form-group">
            <label>Dirección:</label>
            <input type="text" th:field="*{direccion}" required/>
        </div>

        <div class="form-group">
            <label>Teléfono:</label>
            <input type="text" th:field="*{telefono}" required/>
        </div>

        <div class="form-group">
            <label>Rol:</label>
            <select th:field="*{rol}" required>
                <option value="USER">USER</option>
                <option value="ADMIN">ADMIN</option>
            </select>
        </div>

        <div class="form-group">
            <label>Estado:</label>
            <select th:field="*{estado}" required>
                <option value="ACTIVO">ACTIVO</option>
                <option value="INACTIVO">INACTIVO</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit">💾 Guardar Cambios</button>
            <a th:href="@{/admin/usuarios}" class="btn-cancel">← Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
