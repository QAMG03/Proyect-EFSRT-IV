<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mi Carrito</title>
    <link rel="stylesheet" th:href="@{/css/stylesMovimiento.css}">
</head>
<body>
    <h1>Mi Carrito de Compras</h1>

    <div th:if="${#lists.isEmpty(items)}">
        <p>No hay productos en el carrito.</p>
        <a th:href="@{/carrito/catalogo}">Ir al Catálogo</a>
    </div>

    <div th:if="${!#lists.isEmpty(items)}">
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.producto.nombre}"></td>
                    <td th:text="${item.cantidad}"></td>
                    <td>
                        <form th:action="@{/carrito/eliminar}" method="post" style="display:inline;">
                            <input type="hidden" name="id" th:value="${item.id}">
                            <button type="submit">Eliminar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <br>
        <form th:action="@{/carrito/vaciar}" method="post" style="display:inline;">
            <button type="submit" onclick="return confirm('¿Seguro que deseas vaciar el carrito?')">Vaciar Carrito</button>
        </form>
        |
        <a th:href="@{/carrito/catalogo}">Seguir Comprando</a>
    </div>

    <br>
    <a th:href="@{/user-home}">← Volver al Inicio</a>
    
	    
	<div th:if="${items != null and !items.isEmpty()}">
	    <form th:action="@{/carrito/confirmar}" method="get" style="margin-top: 20px;">
	        <button type="submit" style="background-color: #2ecc71; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">
	            ✅ Confirmar compra
	        </button>
	    </form>
	</div>
	
	
	<div th:if="${mensaje}" style="color: green; margin-top: 10px;">
	    <p th:text="${mensaje}"></p>
	</div>
	
	<div th:if="${error}" style="color: red; margin-top: 10px;">
	    <p th:text="${error}"></p>
	</div>
</body>
</html>
